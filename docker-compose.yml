services:
  # Blockchain Services - Authentication and wallet operations
  blockchain-services:
    build:
      context: ./blockchain-services
      dockerfile: Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file:
      - ./blockchain-services/.env  # Blockchain-specific configuration (optional overrides)
    environment:
      # auto => Full when ISSUER is empty, Lite when ISSUER points to an
      # external issuer. Set true/false explicitly for unattended deployments.
      - BLOCKCHAIN_SERVICES_ENABLED=${BLOCKCHAIN_SERVICES_ENABLED:-auto}
      # Server name for URL resolution (WebAuthn rpId, issuer URLs, etc.)
      - SERVER_NAME=${SERVER_NAME}
      - HTTPS_PORT=${HTTPS_PORT:-443}
      # Keep the Gateway's Full/Lite decision visible to the embedded backend
      # when BLOCKCHAIN_SERVICES_ENABLED is left at auto.
      - ISSUER=${ISSUER:-}
      # MySQL datasource for persistence (lab_reservations, auth_users)
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${BLOCKCHAIN_MYSQL_DATABASE:-blockchain_services}?serverTimezone=UTC&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${BLOCKCHAIN_MYSQL_USER:?BLOCKCHAIN_MYSQL_USER must be configured}
      - SPRING_DATASOURCE_PASSWORD=${BLOCKCHAIN_MYSQL_PASSWORD:?BLOCKCHAIN_MYSQL_PASSWORD must be configured}
      # Keep unrelated database/Guacamole principals absent from the backend;
      # this service receives only the explicit credentials above and its own
      # blockchain-services/.env file.
      - MYSQL_ROOT_PASSWORD=
      - MYSQL_USER=
      - MYSQL_PASSWORD=
      - GUACAMOLE_MYSQL_USER=
      - GUACAMOLE_MYSQL_PASSWORD=
      - OPS_BACKEND_MYSQL_USER=
      - OPS_BACKEND_MYSQL_PASSWORD=
      - OPS_GUACAMOLE_MYSQL_USER=
      - OPS_GUACAMOLE_MYSQL_PASSWORD=
      - GUAC_ADMIN_USER=
      - GUAC_ADMIN_PASS=
      - PROVIDER_CONFIG_PATH=/app/data/provider.properties
      - ADMIN_ACCESS_TOKEN=${ADMIN_ACCESS_TOKEN}
      - ADMIN_ACCESS_TOKEN_HEADER=${ADMIN_ACCESS_TOKEN_HEADER:-X-Access-Token}
      - ADMIN_ACCESS_TOKEN_COOKIE=${ADMIN_ACCESS_TOKEN_COOKIE:-access_token}
      - ADMIN_ACCESS_TOKEN_REQUIRED=${ADMIN_ACCESS_TOKEN_REQUIRED:-true}
      - LAB_MANAGER_TOKEN=${LAB_MANAGER_TOKEN}
      # Do not expose the gateway-to-Ops credential to the backend.
      - OPS_INTERNAL_AUTH_TOKEN=
      - OPS_INTERNAL_AUTH_HEADER=
      - LAB_MANAGER_TOKEN_HEADER=${LAB_MANAGER_TOKEN_HEADER:-X-Lab-Manager-Token}
      - ADMIN_DASHBOARD_LOCAL_ONLY=${ADMIN_DASHBOARD_LOCAL_ONLY:-true}
      - ADMIN_DASHBOARD_ALLOW_PRIVATE=${ADMIN_DASHBOARD_ALLOW_PRIVATE:-true}
      - SECURITY_ALLOW_PRIVATE_NETWORKS=${SECURITY_ALLOW_PRIVATE_NETWORKS:-true}
      - ADMIN_ALLOWED_CIDRS=${ADMIN_ALLOWED_CIDRS:-}
      - LAB_MANAGER_ALLOWED_CIDRS=${LAB_MANAGER_ALLOWED_CIDRS:-}
      - LAB_CONTENT_BASE_PATH=/app/lab-content
      - FMU_DATA_PATH=/app/fmu-data
      - 'SPRING_APPLICATION_JSON={"ethereum":{"gas":{"price":{"default":5},"limit":{"contract":1000000}}}}'
    volumes:
      - ./certs:/app/config/keys
      - ./blockchain-data:/app/data
      - ./lab-content:/app/lab-content
      - ./fmu-data:/app/fmu-data:ro
    depends_on:
      mysql:
        condition: service_healthy
    # In Lite mode keep the optional container dormant so the same compose
    # project can be used for upgrades, but never start the Java backend or
    # generate a local JWT key. OpenResty selects the remote key exclusively.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mode="$${BLOCKCHAIN_SERVICES_ENABLED:-auto}"
        issuer="$${ISSUER:-}"
        server_name="$${SERVER_NAME:-localhost}"
        https_port="$${HTTPS_PORT:-443}"
        local_issuer="https://$${server_name}"
        if [ -n "$$https_port" ] && [ "$$https_port" != "443" ]; then
          local_issuer="https://$${server_name}:$${https_port}"
        fi
        local_issuer="$$local_issuer/auth"
        while [ "$${issuer%/}" != "$$issuer" ]; do issuer="$${issuer%/}"; done
        while [ "$${local_issuer%/}" != "$$local_issuer" ]; do local_issuer="$${local_issuer%/}"; done
        lite_mode=false
        if [ -n "$$issuer" ] && [ "$$issuer" != "$$local_issuer" ]; then
          lite_mode=true
        fi
        if [ "$$mode" = "false" ] || { [ "$$mode" = "auto" ] && [ "$$lite_mode" = "true" ]; }; then
          echo "Embedded blockchain-services disabled (Lite mode); container is dormant."
          while :; do sleep 86400; done
        fi
        exec /app/entrypoint.sh
    healthcheck:
      # Probe Spring readiness; /health remains the detailed operational status consumed by the Gateway.
      test:
        - CMD-SHELL
        - >-
          mode="$${BLOCKCHAIN_SERVICES_ENABLED:-auto}";
          issuer="$${ISSUER:-}";
          server_name="$${SERVER_NAME:-localhost}";
          https_port="$${HTTPS_PORT:-443}";
          local_issuer="https://$${server_name}";
          if [ -n "$$https_port" ] && [ "$$https_port" != "443" ]; then local_issuer="https://$${server_name}:$${https_port}"; fi;
          local_issuer="$$local_issuer/auth";
          while [ "$${issuer%/}" != "$$issuer" ]; do issuer="$${issuer%/}"; done;
          while [ "$${local_issuer%/}" != "$$local_issuer" ]; do local_issuer="$${local_issuer%/}"; done;
          lite_mode=false;
          if [ -n "$$issuer" ] && [ "$$issuer" != "$$local_issuer" ]; then lite_mode=true; fi;
          if [ "$$mode" = "false" ] || { [ "$$mode" = "auto" ] && [ "$$lite_mode" = "true" ]; }; then exit 0; fi;
          code=$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/actuator/health/readiness);
          [ "$$code" -eq 200 ]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
        reservations:
          memory: 384M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        labels: "service=blockchain-services"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: always
    networks:
      - gateway_backend
      - ops_backend
      - database_backend
      - fmu_control

  openresty:
    build:
      context: ./openresty
      dockerfile: Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "${OPENRESTY_BIND_ADDRESS:-127.0.0.1}:${OPENRESTY_BIND_HTTPS_PORT:-443}:443"
      - "${OPENRESTY_BIND_ADDRESS:-127.0.0.1}:${OPENRESTY_BIND_HTTP_PORT:-80}:80"
    volumes:
      - ./certs:/etc/ssl/private
      - ./certbot/www:/var/www/certbot
      - ./openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./openresty/lab_access.conf:/etc/openresty/lab_access.conf:ro
      - ./openresty/real_ip.d:/etc/openresty/real_ip.d:ro
      - ./openresty/lua:/etc/openresty/lua:ro
      - ./web:/var/www/html:ro
      - ./lab-content:/var/www/lab-content:ro
      # Full mode: expose blockchain-services JWT public key to OpenResty.
      # Lite mode may still have a stale file here, but mode-specific Lua
      # selection never reads it; Lite uses only certs/public_key.pem.
      - ./blockchain-data/keys:/etc/openresty/jwt-keys:ro
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /var/run:size=16M,mode=755
    environment:
      - GUAC_ADMIN_USER=${GUAC_ADMIN_USER}
      - GUAC_ADMIN_PASS=${GUAC_ADMIN_PASS}
      - GUACAMOLE_LOGIN_RATE_LIMIT_PER_MINUTE=${GUACAMOLE_LOGIN_RATE_LIMIT_PER_MINUTE:-10}
      - SERVER_NAME=${SERVER_NAME}
      - HTTPS_PORT=${HTTPS_PORT}
      - HTTP_PORT=${HTTP_PORT}
      - ISSUER=${ISSUER}
      - AUTH_ACCESS_CODE_REDEEM_URL=${AUTH_ACCESS_CODE_REDEEM_URL:-}
      - AUTH_ACCESS_CODE_REDEEMER_TOKEN=${AUTH_ACCESS_CODE_REDEEMER_TOKEN}
      - API_SESSION_TIMEOUT=${API_SESSION_TIMEOUT:-15}
      - SESSION_OBSERVATION_INGEST_TOKEN=${SESSION_OBSERVATION_INGEST_TOKEN:-}
      - OPS_SESSION_OBSERVATION_INGEST_URL=${OPS_SESSION_OBSERVATION_INGEST_URL:-http://ops-worker:8081/internal/session-observations}
      - OPS_GUACAMOLE_TOKEN_INGEST_URL=${OPS_GUACAMOLE_TOKEN_INGEST_URL:-http://ops-worker:8081/internal/guacamole-token-revocations}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - AUTO_LOGOUT_ON_DISCONNECT=${AUTO_LOGOUT_ON_DISCONNECT:-true}
      - MARKETPLACE_URL=${MARKETPLACE_URL:-https://marketplace-decentralabs.vercel.app}
      - ADMIN_ACCESS_TOKEN=${ADMIN_ACCESS_TOKEN}
      - ADMIN_ACCESS_TOKEN_HEADER=${ADMIN_ACCESS_TOKEN_HEADER:-X-Access-Token}
      - ADMIN_ACCESS_TOKEN_COOKIE=${ADMIN_ACCESS_TOKEN_COOKIE:-access_token}
      - ADMIN_DASHBOARD_LOCAL_ONLY=${ADMIN_DASHBOARD_LOCAL_ONLY:-true}
      - ADMIN_DASHBOARD_ALLOW_PRIVATE=${ADMIN_DASHBOARD_ALLOW_PRIVATE:-true}
      - SECURITY_ALLOW_PRIVATE_NETWORKS=${SECURITY_ALLOW_PRIVATE_NETWORKS:-true}
      - ADMIN_ALLOWED_CIDRS=${ADMIN_ALLOWED_CIDRS:-}
      - ADMIN_TRUST_FORWARDED_IP=${ADMIN_TRUST_FORWARDED_IP:-true}
      - LAB_MANAGER_TOKEN=${LAB_MANAGER_TOKEN}
      - OPS_INTERNAL_AUTH_TOKEN=${OPS_INTERNAL_AUTH_TOKEN:?OPS_INTERNAL_AUTH_TOKEN must be configured}
      - OPS_INTERNAL_AUTH_HEADER=${OPS_INTERNAL_AUTH_HEADER:-X-Ops-Internal-Token}
      - LAB_MANAGER_TOKEN_HEADER=${LAB_MANAGER_TOKEN_HEADER}
      - LAB_MANAGER_TOKEN_COOKIE=${LAB_MANAGER_TOKEN_COOKIE}
      - GUACAMOLE_PROVISIONER_TOKEN=${GUACAMOLE_PROVISIONER_TOKEN:-}
      - GUACAMOLE_PROVISIONER_TOKEN_HEADER=${GUACAMOLE_PROVISIONER_TOKEN_HEADER:-X-Guacamole-Provisioner-Token}
      - LAB_ADMIN_BACKEND_URL=${LAB_ADMIN_BACKEND_URL:-}
      - LAB_ADMIN_BACKEND_TOKEN=${LAB_ADMIN_BACKEND_TOKEN:-}
      - LAB_ADMIN_BACKEND_TOKEN_HEADER=${LAB_ADMIN_BACKEND_TOKEN_HEADER:-X-Lab-Manager-Token}
      - LAB_ADMIN_BACKEND_ALLOW_INSECURE=${LAB_ADMIN_BACKEND_ALLOW_INSECURE:-false}
      - FMU_RUNNER_ENABLED=${FMU_RUNNER_ENABLED:-false}
      - AAS_ENABLED=${AAS_ENABLED:-}
      - BASYX_AAS_URL=${BASYX_AAS_URL:-}
      - AAS_ALLOWED_HOSTS=${AAS_ALLOWED_HOSTS:-}
      - AAS_SERVICE_TOKEN=${AAS_SERVICE_TOKEN:-}
      - AAS_SERVICE_TOKEN_HEADER=${AAS_SERVICE_TOKEN_HEADER:-Authorization}
      - DEMO_USER=${DEMO_USER:-demo}
      - DEMO_LAB_ID=${DEMO_LAB_ID:-}
      - JWT_GUAC_IDLE_TIMEOUT_SECONDS=${JWT_GUAC_IDLE_TIMEOUT_SECONDS:-60}
      - JWT_KEY_OVERLAP_SECONDS=${JWT_KEY_OVERLAP_SECONDS:-14400}
      - JWT_KEY_REFRESH_INTERVAL_SECONDS=${JWT_KEY_REFRESH_INTERVAL_SECONDS:-300}
    depends_on:
      guacamole:
        condition: service_healthy
      blockchain-services:
        condition: service_healthy  # Full waits for its JWT key; Lite is dormant/ready
      ops-worker:
        condition: service_started
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f -k https://localhost:443/ -H 'Host: ${SERVER_NAME}' --connect-timeout 5"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.3'
        reservations:
          memory: 64M
          cpus: '0.2'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        labels: "service=openresty"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    restart: always
    networks:
      - gateway_public
      - gateway_backend
      - gateway_guacamole
      - ops_control
      - fmu_edge
      - fmu_local_edge
      - fmu_aas

  cloudflared:
    image: cloudflare/cloudflared:2024.11.0
    profiles: ["cloudflare"]
    depends_on:
      openresty:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        set -e
        target="${CLOUDFLARE_TUNNEL_SERVICE:-https://openresty:443}"

        # If we have real certs and a non-localhost hostname, trust TLS; otherwise allow self-signed.
        have_real_cert=false
        if [ -s /certs/fullchain.pem ] && [ -s /certs/privkey.pem ] && [ "${SERVER_NAME:-localhost}" != "localhost" ]; then
          have_real_cert=true
        fi

        args="tunnel --no-autoupdate --protocol http2 --url $${target}"
        if [ "$$have_real_cert" != "true" ]; then
          args="$$args --no-tls-verify"
        fi

        exec cloudflared $$args
    environment:
      - CLOUDFLARE_TUNNEL_SERVICE=${CLOUDFLARE_TUNNEL_SERVICE:-https://openresty:443}
      - SERVER_NAME=${SERVER_NAME}
    volumes:
      - ./certs:/certs:ro
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    networks:
      - gateway_public

  cloudflared-token:
    image: cloudflare/cloudflared:2024.11.0
    profiles: ["cloudflare-token"]
    depends_on:
      openresty:
        condition: service_healthy
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN}
    environment:
      - CLOUDFLARE_TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    networks:
      - gateway_public

  certbot:
    image: certbot/certbot:v2.11.0
    profiles: ["certbot"]
    entrypoint: ["sh", "-c", "certbot --version"]
    volumes:
      - ./certs:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Usage example:
    # docker compose run --rm --profile certbot certbot certonly --webroot -w /var/www/certbot -d your.domain --email you@example.com --agree-tos --no-eff-email

  certbot-renew:
    image: certbot/certbot:v2.11.0
    profiles: ["certbot"]
    restart: unless-stopped
    entrypoint: ["sh", "-c", "while true; do certbot renew --webroot -w /var/www/certbot --quiet || true; sleep 12h; done"]
    volumes:
      - ./certs:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  certbot-init:
    image: certbot/certbot:v2.11.0
    profiles: ["certbot"]
    restart: "no"
    entrypoint: >
      sh -c '
      if [ -z "$$CERTBOT_DOMAINS" ] || [ -z "$$CERTBOT_EMAIL" ]; then
        echo "CERTBOT_DOMAINS or CERTBOT_EMAIL not set; skipping initial cert issuance";
        exit 0;
      fi;
      primary_domain=$${CERTBOT_DOMAINS%%,*};
      if [ -f "/etc/letsencrypt/live/$$primary_domain/fullchain.pem" ]; then
        echo "Certificate already present for $$primary_domain; skipping issuance";
        exit 0;
      fi;
      domains="";
      for d in $${CERTBOT_DOMAINS//,/ }; do domains="$$domains -d $$d"; done;
      staging="";
      if [ "$$CERTBOT_STAGING" = "1" ]; then staging="--staging"; fi;
      certbot certonly --non-interactive --agree-tos $$staging --webroot -w /var/www/certbot $$domains -m "$$CERTBOT_EMAIL"
      '
    environment:
      - CERTBOT_DOMAINS=${CERTBOT_DOMAINS}
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
      - CERTBOT_STAGING=${CERTBOT_STAGING:-0}
    volumes:
      - ./certs:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  mysql:
    image: mysql:8.0.41
    entrypoint: ["/bin/bash", "/usr/local/bin/ensure-user-entrypoint.sh"]
    command: ["mysqld"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      # Legacy names are passed only so 000-ensure-user.sh can reconcile old
      # installations; application containers use the dedicated principals.
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      BLOCKCHAIN_MYSQL_DATABASE: ${BLOCKCHAIN_MYSQL_DATABASE:-blockchain_services}
      GUACAMOLE_MYSQL_USER: ${GUACAMOLE_MYSQL_USER:?GUACAMOLE_MYSQL_USER must be configured}
      GUACAMOLE_MYSQL_PASSWORD: ${GUACAMOLE_MYSQL_PASSWORD:?GUACAMOLE_MYSQL_PASSWORD must be configured}
      BLOCKCHAIN_MYSQL_USER: ${BLOCKCHAIN_MYSQL_USER:?BLOCKCHAIN_MYSQL_USER must be configured}
      BLOCKCHAIN_MYSQL_PASSWORD: ${BLOCKCHAIN_MYSQL_PASSWORD:?BLOCKCHAIN_MYSQL_PASSWORD must be configured}
      OPS_BACKEND_MYSQL_USER: ${OPS_BACKEND_MYSQL_USER:?OPS_BACKEND_MYSQL_USER must be configured}
      OPS_BACKEND_MYSQL_PASSWORD: ${OPS_BACKEND_MYSQL_PASSWORD:?OPS_BACKEND_MYSQL_PASSWORD must be configured}
      OPS_GUACAMOLE_MYSQL_USER: ${OPS_GUACAMOLE_MYSQL_USER:?OPS_GUACAMOLE_MYSQL_USER must be configured}
      OPS_GUACAMOLE_MYSQL_PASSWORD: ${OPS_GUACAMOLE_MYSQL_PASSWORD:?OPS_GUACAMOLE_MYSQL_PASSWORD must be configured}
      GUAC_ADMIN_USER: ${GUAC_ADMIN_USER}
      GUAC_ADMIN_PASS: ${GUAC_ADMIN_PASS}
      DEMO_USER: ${DEMO_USER:-demo}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/ensure-user-entrypoint.sh:/usr/local/bin/ensure-user-entrypoint.sh:ro
      - ./mysql/000-ensure-user.sh:/docker-entrypoint-initdb.d/000-ensure-user.sh:ro
      - ./mysql/001-create-schema.sql:/docker-entrypoint-initdb.d/001-create-schema.sql:ro
      - ./mysql/002-labstation-ops.sql:/docker-entrypoint-initdb.d/002-labstation-ops.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$${MYSQL_ROOT_PASSWORD}\" && mysql -h localhost -u\"$${BLOCKCHAIN_MYSQL_USER}\" -p\"$${BLOCKCHAIN_MYSQL_PASSWORD}\" \"$${BLOCKCHAIN_MYSQL_DATABASE}\" -e \"SELECT 1\""]
      timeout: 20s
      retries: 10
      interval: 30s
      start_period: 60s  # MySQL needs time to initialize
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '0.75'
        reservations:
          memory: 384M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=mysql"
    security_opt:
      - no-new-privileges:true
    #ports:
    # - "3306:3306"
    restart: always
    networks:
      - database_backend
      - database_guacamole
      - database_ops

  guacamole:
    build:
      context: ./guacamole
      dockerfile: Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      guacd:
        condition: service_healthy
    environment:
      GUACD_HOSTNAME: guacd
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${GUACAMOLE_MYSQL_USER:?GUACAMOLE_MYSQL_USER must be configured}
      MYSQL_PASSWORD: ${GUACAMOLE_MYSQL_PASSWORD:?GUACAMOLE_MYSQL_PASSWORD must be configured}
      MYSQL_HOSTNAME: mysql
      API_SESSION_TIMEOUT: ${API_SESSION_TIMEOUT:-15}
      BAN_MAX_INVALID_ATTEMPTS: ${BAN_MAX_INVALID_ATTEMPTS:-5}
      BAN_ADDRESS_DURATION: ${BAN_ADDRESS_DURATION:-300}
      BAN_MAX_ADDRESSES: ${BAN_MAX_ADDRESSES:-10485670}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/guacamole/"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 120s  # Guacamole needs time to fully start
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        labels: "service=guacamole"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    #ports:
    # - "8080:8080"
    networks:
      - gateway_guacamole
      - database_guacamole
      - guacd_net
  guacd:
    image: guacamole/guacd:1.6.0
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4822"]
      timeout: 10s
      retries: 3
      interval: 30s
      start_period: 30s
    tmpfs:
      - /tmp:size=128M,mode=1777
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.2'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
        labels: "service=guacd"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: always
    #ports:
    # - "4822:4822"
    networks:
      - guacd_net

  ops-worker:
    build:
      context: ./ops-worker
      dockerfile: Dockerfile
      args:
        OPS_UID: ${HOST_UID:-1000}
        OPS_GID: ${HOST_GID:-1000}
    environment:
      - OPS_BIND=0.0.0.0
      - OPS_PORT=8081
      - OPS_CONFIG=/app/hosts.json
      - OPS_DYNAMIC_CONFIG=/app/data/hosts.json
      - OPS_CREDENTIALS_PATH=${OPS_CREDENTIALS_PATH:-/app/data/winrm-credentials.json}
      - OPS_SECRETS_KEY=${OPS_SECRETS_KEY:-}
      - OPS_SECRETS_KEY_PATH=${OPS_SECRETS_KEY_PATH:-/app/data/ops-secrets.key}
      - OPS_POLL_ENABLED=true
      - OPS_POLL_INTERVAL=60
      - OPS_RESERVATION_AUTOMATION=true
      - OPS_RESERVATION_SCAN_INTERVAL=30
      - OPS_RESERVATION_START_LEAD=120
      - OPS_RESERVATION_END_DELAY=60
      - SERVER_NAME=${SERVER_NAME}
      - HTTPS_PORT=${HTTPS_PORT}
      - ISSUER=${ISSUER}
      - LAB_MANAGER_TOKEN=${LAB_MANAGER_TOKEN}
      - OPS_INTERNAL_AUTH_TOKEN=${OPS_INTERNAL_AUTH_TOKEN:?OPS_INTERNAL_AUTH_TOKEN must be configured}
      - OPS_INTERNAL_AUTH_HEADER=${OPS_INTERNAL_AUTH_HEADER:-X-Ops-Internal-Token}
      - GUACAMOLE_PROVISIONER_TOKEN=${GUACAMOLE_PROVISIONER_TOKEN:-}
      - GUACAMOLE_PROVISIONER_TOKEN_HEADER=${GUACAMOLE_PROVISIONER_TOKEN_HEADER:-X-Guacamole-Provisioner-Token}
      - MYSQL_HOSTNAME=mysql
      - MYSQL_USER=${OPS_BACKEND_MYSQL_USER:?OPS_BACKEND_MYSQL_USER must be configured}
      - MYSQL_PASSWORD=${OPS_BACKEND_MYSQL_PASSWORD:?OPS_BACKEND_MYSQL_PASSWORD must be configured}
      - OPS_BACKEND_MYSQL_USER=${OPS_BACKEND_MYSQL_USER:?OPS_BACKEND_MYSQL_USER must be configured}
      - OPS_BACKEND_MYSQL_PASSWORD=${OPS_BACKEND_MYSQL_PASSWORD:?OPS_BACKEND_MYSQL_PASSWORD must be configured}
      - OPS_GUACAMOLE_MYSQL_USER=${OPS_GUACAMOLE_MYSQL_USER:?OPS_GUACAMOLE_MYSQL_USER must be configured}
      - OPS_GUACAMOLE_MYSQL_PASSWORD=${OPS_GUACAMOLE_MYSQL_PASSWORD:?OPS_GUACAMOLE_MYSQL_PASSWORD must be configured}
      - OPS_MYSQL_DATABASE=${BLOCKCHAIN_MYSQL_DATABASE:-blockchain_services}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - GUACAMOLE_MYSQL_DATABASE=${MYSQL_DATABASE}
      - ACCESS_AUDIT_URL=${ACCESS_AUDIT_URL:-}
      - SESSION_OBSERVER_GATEWAY_ID=${SESSION_OBSERVER_GATEWAY_ID:-}
      - SESSION_OBSERVER_SIGNING_SECRET=${SESSION_OBSERVER_SIGNING_SECRET:-}
      - SESSION_OBSERVATION_INGEST_TOKEN=${SESSION_OBSERVATION_INGEST_TOKEN:-}
      - GUAC_ADMIN_USER=${GUAC_ADMIN_USER}
      - GUAC_ADMIN_PASS=${GUAC_ADMIN_PASS}
      - GUAC_API_URL=${GUAC_API_URL:-http://guacamole:8080/guacamole/api}
      - GUACAMOLE_HISTORY_LOOKBACK_SECONDS=${GUACAMOLE_HISTORY_LOOKBACK_SECONDS:-30}
      - GUACAMOLE_HISTORY_RECONCILIATION_RETENTION_SECONDS=${GUACAMOLE_HISTORY_RECONCILIATION_RETENTION_SECONDS:-300}
      - WINRM_REQUIRE_SSL=${WINRM_REQUIRE_SSL:-true}
      - WINRM_ALLOWED_TRANSPORTS=${WINRM_ALLOWED_TRANSPORTS:-ntlm,kerberos,credssp}
      - WINRM_ALLOWED_SSL_PORTS=${WINRM_ALLOWED_SSL_PORTS:-5986}
      - WINRM_ALLOWED_PLAINTEXT_PORTS=${WINRM_ALLOWED_PLAINTEXT_PORTS:-5985}
      - BASYX_AAS_URL=${BASYX_AAS_URL:-http://basyx-aas-server:8081}
      - AAS_ALLOWED_HOSTS=${AAS_ALLOWED_HOSTS:-}
      - AAS_SERVICE_TOKEN=${AAS_SERVICE_TOKEN:-}
      - AAS_SERVICE_TOKEN_HEADER=${AAS_SERVICE_TOKEN_HEADER:-Authorization}
    volumes:
      - ${OPS_CONFIG_PATH:-./ops-worker/hosts.empty.json}:/app/hosts.json:ro
      - ./ops-data:/app/data
    tmpfs:
      - /tmp:size=32M,mode=1777
    read_only: true
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.4'
        reservations:
          memory: 128M
          cpus: '0.2'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ops-worker"
    security_opt:
      - no-new-privileges:true
      # Keep Docker's default seccomp profile; do not override it.
    cap_drop:
      - ALL
    restart: always
    networks:
      - ops_control
      - ops_backend
      - database_ops
      - ops_guacamole
      - fmu_aas_ops

  # FMU Runner - FMI Co-Simulation execution service
  fmu-runner:
    profiles: ["fmu-runner"]
    build:
      context: ./fmu-runner
      dockerfile: Dockerfile
    environment:
      # The production facade is Station-only. Local native execution uses
      # the separate fmu-runner-local profile below, without control secrets.
      - FMU_BACKEND_MODE=station
      - FMU_DATA_PATH=/app/fmu-data
      - FMU_PROXY_RUNTIME_PATH=/app/fmu-proxy-runtime
      - FMU_STATION_BASE_URL=${FMU_STATION_BASE_URL:-}
      - FMU_STATION_INTERNAL_TOKEN=${FMU_STATION_INTERNAL_TOKEN:-}
      - FMU_STATION_REQUEST_TIMEOUT=${FMU_STATION_REQUEST_TIMEOUT:-10}
      - FMU_SESSION_OBSERVATION_MAX_ATTEMPTS=${FMU_SESSION_OBSERVATION_MAX_ATTEMPTS:-3}
      - HISTORY_DB_PATH=/app/data/history.db
      - ISSUER=${ISSUER:-}
      - JWT_ISSUER=${JWT_ISSUER:-}
      - AUTH_JWKS_URL=${AUTH_JWKS_URL:-}
      - JWKS_CACHE_TTL=${JWKS_CACHE_TTL:-300}
      - JWKS_STALE_IF_ERROR_MAX_SECONDS=${JWKS_STALE_IF_ERROR_MAX_SECONDS:-900}
      - JWT_AUDIENCE=${FMU_JWT_AUDIENCE:?FMU_JWT_AUDIENCE must be the exact public FMU URL, e.g. https://gateway.example/fmu}
      - AUTH_SESSION_TICKET_ISSUE_URL=${AUTH_SESSION_TICKET_ISSUE_URL:-http://blockchain-services:8080/auth/fmu/session-ticket/issue}
      - AUTH_SESSION_TICKET_REDEEM_URL=${AUTH_SESSION_TICKET_REDEEM_URL:-http://blockchain-services:8080/auth/fmu/session-ticket/redeem}
      - AUTH_SESSION_TICKET_INTERNAL_TOKEN=${AUTH_SESSION_TICKET_INTERNAL_TOKEN:-}
      - ACCESS_AUDIT_URL=${ACCESS_AUDIT_URL:-}
      - FMU_GATEWAY_ID=${FMU_GATEWAY_ID:-}
      - SESSION_OBSERVER_GATEWAY_ID=${SESSION_OBSERVER_GATEWAY_ID:-}
      - SESSION_OBSERVER_SIGNING_SECRET=${SESSION_OBSERVER_SIGNING_SECRET:-}
      - SERVER_NAME=${SERVER_NAME}
      - MAX_SIMULATION_TIMEOUT=${FMU_MAX_SIMULATION_TIMEOUT:-300}
      - MAX_CONCURRENT_PER_MODEL=${FMU_MAX_CONCURRENT_PER_MODEL:-10}
      - PROXY_DOWNLOAD_RATE_LIMIT_PER_MINUTE=${FMU_PROXY_DOWNLOAD_RATE_LIMIT_PER_MINUTE:-20}
      - WS_CREATE_RATE_LIMIT_PER_MINUTE=${FMU_WS_CREATE_RATE_LIMIT_PER_MINUTE:-30}
      - FMU_PROXY_GATEWAY_WS_URL=${FMU_PROXY_GATEWAY_WS_URL:-}
      - FMU_PROXY_SIGNING_KEY=${FMU_PROXY_SIGNING_KEY:-}
      - BASYX_AAS_URL=${BASYX_AAS_URL:-http://basyx-aas-server:8081}
      - AAS_ALLOWED_HOSTS=${AAS_ALLOWED_HOSTS:-}
      - AAS_SERVICE_TOKEN=${AAS_SERVICE_TOKEN:-}
      - AAS_SERVICE_TOKEN_HEADER=${AAS_SERVICE_TOKEN_HEADER:-Authorization}
    volumes:
      - ./fmu-data:/app/fmu-data:ro
      - ./fmu-proxy-runtime:/app/fmu-proxy-runtime:ro
      - fmu-history:/app/data
    tmpfs:
      - /tmp:size=64M,mode=1777
    read_only: true
    depends_on:
      blockchain-services:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        labels: "service=fmu-runner"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: always
    networks:
      - fmu_edge
      - fmu_control
      - fmu_aas

  # Explicit development-only local FMU execution. This service deliberately
  # does not receive Station/session-observer/proxy-signing credentials and
  # has no route to the control or AAS networks. OpenResty reaches it through
  # the fmu-runner network alias on the isolated internal edge.
  fmu-runner-local:
    profiles: ["fmu-local-dev"]
    build:
      context: ./fmu-runner
      dockerfile: Dockerfile
    environment:
      - FMU_BACKEND_MODE=local
      - FMU_LOCAL_DEV_MODE=true
      - FMU_LOCAL_REALTIME_ENABLED=${FMU_LOCAL_REALTIME_ENABLED:-false}
      - FMU_DATA_PATH=/app/fmu-data
      - FMU_PROXY_RUNTIME_PATH=/app/fmu-proxy-runtime
      - HISTORY_DB_PATH=/app/data/history.db
      - ISSUER=${ISSUER:-}
      - JWT_ISSUER=${JWT_ISSUER:-}
      - AUTH_JWKS_URL=${AUTH_JWKS_URL:-}
      - JWKS_CACHE_TTL=${JWKS_CACHE_TTL:-300}
      - JWKS_STALE_IF_ERROR_MAX_SECONDS=${JWKS_STALE_IF_ERROR_MAX_SECONDS:-900}
      - JWT_AUDIENCE=${FMU_JWT_AUDIENCE:?FMU_JWT_AUDIENCE must be the exact public FMU URL, e.g. https://gateway.example/fmu}
      - SERVER_NAME=${SERVER_NAME}
      - MAX_SIMULATION_TIMEOUT=${FMU_MAX_SIMULATION_TIMEOUT:-300}
      - MAX_CONCURRENT_PER_MODEL=${FMU_MAX_CONCURRENT_PER_MODEL:-10}
      - PROXY_DOWNLOAD_RATE_LIMIT_PER_MINUTE=${FMU_PROXY_DOWNLOAD_RATE_LIMIT_PER_MINUTE:-20}
      - WS_CREATE_RATE_LIMIT_PER_MINUTE=${WS_CREATE_RATE_LIMIT_PER_MINUTE:-30}
    volumes:
      - ./fmu-data:/app/fmu-data:ro
      - ./fmu-proxy-runtime:/app/fmu-proxy-runtime:ro
      - fmu-local-history:/app/data
    tmpfs:
      - /tmp:size=64M,mode=1777
    read_only: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
        labels: "service=fmu-runner-local"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: "no"
    networks:
      fmu_local_edge:
        aliases:
          - fmu-runner

  # BaSyx AAS Server - Asset Administration Shell registry & repository
  # Public read via /aas/ (OpenResty), admin write via /aas-admin/ (lab_manager_admin_access.lua)
  # Only available in Full Gateway instances (one per institution).
  # Start with: docker compose --profile aas up  (or COMPOSE_PROFILES=aas)
  basyx-aas-server:
    image: eclipsebasyx/aas-environment:2.0.0-milestone-04
    profiles: ["aas"]
    environment:
      - BASYX_AASREPOSITORY_FEATURE_MQTT_ENABLED=false
      - BASYX_BACKEND=MongoDB
      - SPRING_DATA_MONGODB_URI=mongodb://${BASYX_MONGO_USER:-aas_app}:${BASYX_MONGO_PASSWORD:-CHANGE_ME}@basyx-mongo:27017/basyx?authSource=basyx
      - SERVER_PORT=8081
    depends_on:
      basyx-mongo:
        condition: service_healthy
    volumes:
      - basyx_aas_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "code=$$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8081/shells) && [ $$code -eq 200 ]"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=basyx-aas-server"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: always
    networks:
      - fmu_aas
      - fmu_aas_ops
      - aas_data

  # MongoDB backend for BaSyx AAS Server — persists shells/submodels across restarts.
  # Only used when the 'aas' profile is active.
  basyx-mongo:
    image: mongo:7.0.14
    profiles: ["aas"]
    command: mongod --auth --quiet --logpath /dev/null
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${BASYX_MONGO_ROOT_USER:-basyx_root}
      MONGO_INITDB_ROOT_PASSWORD: ${BASYX_MONGO_ROOT_PASSWORD:-CHANGE_ME}
      BASYX_MONGO_USER: ${BASYX_MONGO_USER:-aas_app}
      BASYX_MONGO_PASSWORD: ${BASYX_MONGO_PASSWORD:-CHANGE_ME}
    volumes:
      - basyx_mongo_data:/data/db
      - ./basyx-mongo/init-user.js:/docker-entrypoint-initdb.d/01-create-aas-user.js:ro
    healthcheck:
      test: ["CMD-SHELL", "test \"$${MONGO_INITDB_ROOT_PASSWORD}\" != CHANGE_ME && test \"$${BASYX_MONGO_PASSWORD}\" != CHANGE_ME && mongosh --quiet --host localhost -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep -q '^1$' && mongosh --quiet --host localhost -u \"$${BASYX_MONGO_USER}\" -p \"$${BASYX_MONGO_PASSWORD}\" --authenticationDatabase basyx --eval \"db.adminCommand('ping').ok\" | grep -q '^1$'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 64M
    # The official MongoDB entrypoint starts as root and uses gosu to drop
    # privileges to the mongodb user. no-new-privileges and cap_drop: ALL
    # prevent that transition and cause the container to restart endlessly.
    tmpfs:
      - /tmp:size=64M,mode=1777
    restart: always
    networks:
      - aas_data

networks:
  gateway_public:
    driver: bridge
  gateway_backend:
    driver: bridge
    internal: true
  gateway_guacamole:
    driver: bridge
    internal: true
  ops_control:
    driver: bridge
    internal: true
  ops_backend:
    driver: bridge
  ops_guacamole:
    driver: bridge
    internal: true
  guacd_net:
    driver: bridge
  database_backend:
    driver: bridge
    internal: true
  database_guacamole:
    driver: bridge
    internal: true
  database_ops:
    driver: bridge
    internal: true
  fmu_edge:
    driver: bridge
    internal: true
  fmu_control:
    driver: bridge
    internal: true
  fmu_aas:
    driver: bridge
    internal: true
  fmu_aas_ops:
    driver: bridge
    internal: true
  fmu_local_edge:
    driver: bridge
    internal: true
  aas_data:
    driver: bridge
    internal: true

volumes:
  mysql_data:
  fmu-history:
  fmu-local-history:
  basyx_mongo_data:
  basyx_aas_data:
