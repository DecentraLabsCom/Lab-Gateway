version: 2
updates:
  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Python runtime dependencies
  - package-ecosystem: "pip"
    directory: "/fmu-runner"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/ops-worker"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    commit-message:
      prefix: "deps"
      include: "scope"

  # Compose image references, including the pinned Guacamole/Certbot/AAS images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    commit-message:
      prefix: "docker"
      include: "scope"

  # Dockerfiles (OpenResty gateway)
  - package-ecosystem: "docker"
    directory: "/openresty"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    commit-message:
      prefix: "docker"
      include: "scope"

  # Dockerfiles (Guacamole wrapper)
  - package-ecosystem: "docker"
    directory: "/guacamole"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    commit-message:
      prefix: "docker"
      include: "scope"

  # Dockerfiles (Smoke-test Guacamole mock)
  - package-ecosystem: "docker"
    directory: "/tests/smoke/mocks/guacamole"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    commit-message:
      prefix: "docker"
      include: "scope"
