name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-linux64-runtime:
    name: Rebuild and verify linux64 proxy runtime
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build runtime from source
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            -f fmu-proxy-runtime-src/docker/linux64-builder.Dockerfile \
            -t decentralabs-proxy-builder:ci \
            fmu-proxy-runtime-src
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/fmu-proxy-runtime-src:/workspace" \
            decentralabs-proxy-builder:ci \
            bash -lc 'cmake -S /workspace -B /workspace/build-ci -G Ninja -DCMAKE_BUILD_TYPE=Release && cmake --build /workspace/build-ci -j2'
          test -f fmu-proxy-runtime-src/build-ci/libdecentralabs_proxy.so
          cmp --silent \
            fmu-proxy-runtime-src/build-ci/libdecentralabs_proxy.so \
            fmu-proxy-runtime/binaries/linux64/decentralabs_proxy.so
          sha256sum fmu-proxy-runtime-src/build-ci/libdecentralabs_proxy.so \
            fmu-proxy-runtime/binaries/linux64/decentralabs_proxy.so

      - name: Upload source-built linux64 runtime
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: proxy-runtime-linux64
          path: fmu-proxy-runtime-src/build-ci/libdecentralabs_proxy.so
          if-no-files-found: error

  build-win64-runtime:
    name: Rebuild and verify win64 proxy runtime
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build runtime from source
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cmake -S fmu-proxy-runtime-src -B fmu-proxy-runtime-src/build-ci -A x64
          cmake --build fmu-proxy-runtime-src/build-ci --config Release --parallel
          $built = "fmu-proxy-runtime-src/build-ci/Release/decentralabs_proxy.dll"
          $promoted = "fmu-proxy-runtime/binaries/win64/decentralabs_proxy.dll"
          if (-not (Test-Path $built)) { throw "Source build did not produce $built" }
          $builtHash = (Get-FileHash $built -Algorithm SHA256).Hash
          $promotedHash = (Get-FileHash $promoted -Algorithm SHA256).Hash
          if ($builtHash -ne $promotedHash) {
            Write-Warning "Promoted win64 runtime differs from the source build; the source-built artifact will be released"
          }
          Get-FileHash $built -Algorithm SHA256
          Get-FileHash $promoted -Algorithm SHA256

      - name: Upload source-built win64 runtime
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: proxy-runtime-win64
          path: fmu-proxy-runtime-src/build-ci/Release/decentralabs_proxy.dll
          if-no-files-found: error

  package-release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    needs: [build-linux64-runtime, build-win64-runtime]
    permissions:
      contents: write
      id-token: write
      attestations: write

    env:
      DIST_DIR: dist
      FMU_RUNNER_COVERAGE_MIN: "75"
      REPO_COVERAGE_MIN: "85"

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            fmu-runner/requirements.txt
            fmu-runner/requirements-dev.txt

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download source-built proxy runtimes
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: .ci-runtime

      - name: Install Python test dependencies
        working-directory: fmu-runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run FMU Runner tests with coverage gate
        working-directory: fmu-runner
        run: |
          python -m pytest tests \
            --cov=. \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=pytest-results.xml \
            --cov-fail-under=${FMU_RUNNER_COVERAGE_MIN} \
            -q

      - name: Run Lua unit tests with coverage
        id: run_lua_tests
        continue-on-error: true
        env:
          LUA_PATH: "/workspace/lua/?.lua;/workspace/lua/?/init.lua;;"
        run: |
          set -o pipefail
          mkdir -p .ci-logs
          docker run --rm \
            -e LUA_PATH="${LUA_PATH}" \
            -v "${{ github.workspace }}/openresty:/workspace" \
            -w /workspace \
            openresty/openresty:1.31.1.1-1-alpine-fat sh -c \
            "cp tests/luacov-ci.lua .luacov && \
             apk add --no-cache build-base openssl openssl-dev git luarocks >/dev/null && \
             luarocks install lua-cjson >/dev/null && \
             luarocks install lua-resty-openssl >/dev/null && \
             luarocks install luacov >/dev/null && \
             luajit -lluacov tests/run.lua; \
             test_exit=\$?; luacov -c tests/luacov-ci.lua; report_exit=\$?; rm -f .luacov; \
             test \$report_exit -eq 0 || exit \$report_exit; exit \$test_exit" | tee .ci-logs/lua-unit.log

      - name: Enforce consolidated coverage baseline
        run: |
          mkdir -p .ci-summary
          python .github/scripts/test_summary.py suite \
            --suite-id python-unit \
            --suite-name "Python unit" \
            --kind pytest \
            --junit fmu-runner/pytest-results.xml \
            --coverage-xml fmu-runner/coverage.xml \
            --coverage-label "coverage.py" \
            --output .ci-summary/python-unit.json
          python .github/scripts/test_summary.py suite \
            --suite-id lua-unit \
            --suite-name "Lua unit" \
            --kind shell \
            --log .ci-logs/lua-unit.log \
            --coverage-report openresty/luacov.report.out \
            --coverage-label "luacov" \
            --exit-code ${{ steps.run_lua_tests.outcome != 'success' && '1' || '0' }} \
            --output .ci-summary/lua-unit.json
          python .github/scripts/test_summary.py gate \
            --input-dir .ci-summary \
            --suite-ids python-unit,lua-unit \
            --min-coverage ${REPO_COVERAGE_MIN}

      - name: Fail job if Lua tests failed
        if: steps.run_lua_tests.outcome != 'success'
        run: exit 1

      - name: Run gateway integration suite
        run: |
          chmod +x tests/integration/run-integration.sh
          chmod +x tests/integration/certs/generate-certs.sh
          tests/integration/run-integration.sh

      - name: Run FMU integration suite
        run: |
          chmod +x tests/integration/run-fmu-integration.sh
          chmod +x tests/integration/certs/generate-certs.sh
          tests/integration/run-fmu-integration.sh

      - name: Run OpenResty smoke test
        run: |
          chmod +x tests/smoke/run-smoke.sh
          tests/smoke/run-smoke.sh

      - name: Stage distribution directory
        run: |
          rm -rf "$DIST_DIR"
          cp .ci-runtime/proxy-runtime-linux64/libdecentralabs_proxy.so \
            fmu-proxy-runtime/binaries/linux64/decentralabs_proxy.so
          cp .ci-runtime/proxy-runtime-win64/decentralabs_proxy.dll \
            fmu-proxy-runtime/binaries/win64/decentralabs_proxy.dll
          mkdir -p "$DIST_DIR/lab-gateway-full-${{ steps.version.outputs.VERSION }}"
          rsync -a \
            --exclude='.git' \
            --exclude='dist' \
            --exclude='.ci-runtime' \
            --exclude='blockchain-data' \
            --exclude='*.log' \
            --exclude='luacov.report.out' \
            --exclude='luacov.stats.out' \
            ./ "$DIST_DIR/lab-gateway-full-${{ steps.version.outputs.VERSION }}/"

      - name: Build archives
        run: |
          cd "$DIST_DIR"
          tar -czf "lab-gateway-full-${{ steps.version.outputs.VERSION }}.tar.gz" "lab-gateway-full-${{ steps.version.outputs.VERSION }}"
          zip -qr "lab-gateway-full-${{ steps.version.outputs.VERSION }}.zip" "lab-gateway-full-${{ steps.version.outputs.VERSION }}"

      - name: Generate checksums
        run: |
          cd "$DIST_DIR"
          sha256sum "lab-gateway-full-${{ steps.version.outputs.VERSION }}.tar.gz" > "lab-gateway-full-${{ steps.version.outputs.VERSION }}.tar.gz.sha256"
          sha256sum "lab-gateway-full-${{ steps.version.outputs.VERSION }}.zip" > "lab-gateway-full-${{ steps.version.outputs.VERSION }}.zip.sha256"

      - name: Generate release SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: "${{ env.DIST_DIR }}/lab-gateway-full-${{ steps.version.outputs.VERSION }}"
          format: cyclonedx-json
          output-file: "${{ env.DIST_DIR }}/lab-gateway-full-${{ steps.version.outputs.VERSION }}.sbom.cdx.json"

      - name: Checksum release SBOM
        run: |
          cd "$DIST_DIR"
          sha256sum "lab-gateway-full-${{ steps.version.outputs.VERSION }}.sbom.cdx.json" > "lab-gateway-full-${{ steps.version.outputs.VERSION }}.sbom.cdx.json.sha256"

      - name: Attest release provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            ${{ env.DIST_DIR }}/lab-gateway-full-${{ steps.version.outputs.VERSION }}.tar.gz
            ${{ env.DIST_DIR }}/lab-gateway-full-${{ steps.version.outputs.VERSION }}.zip

      - name: Create Release
        uses: softprops/action-gh-release@c12583777ecdfd3be55c69cf75464299dc01057e # v3
        with:
          files: |
            dist/lab-gateway-full-${{ steps.version.outputs.VERSION }}.tar.gz
            dist/lab-gateway-full-${{ steps.version.outputs.VERSION }}.tar.gz.sha256
            dist/lab-gateway-full-${{ steps.version.outputs.VERSION }}.zip
            dist/lab-gateway-full-${{ steps.version.outputs.VERSION }}.zip.sha256
            dist/lab-gateway-full-${{ steps.version.outputs.VERSION }}.sbom.cdx.json
            dist/lab-gateway-full-${{ steps.version.outputs.VERSION }}.sbom.cdx.json.sha256
          body: |
            ## 🚀 Lab Gateway ${{ steps.version.outputs.VERSION }}

            ### 📦 What's Included
            - Docker Compose stack (OpenResty, Guacamole, MySQL, blockchain-services submodule)
            - Setup scripts for Windows (`setup.bat`) and Linux/macOS (`setup.sh`)
            - Smoke-test tooling and Lua unit tests
            - Documentation and environment templates

            ### ✅ Before Deploying
            1. Copy `.env.example` to `.env` and review every variable (domain, blockchain RPC, DB credentials, JWT/Wallet settings).
            2. Run `setup.bat` or `setup.sh` to initialize secrets, TLS/JWT keys, and the `blockchain-data/` volume for wallet persistence.
            3. Start the stack with `docker compose up -d`.
            4. Visit `https://<host>/wallet-dashboard` to create/import the institutional wallet and update `.env` / `blockchain-services/.env` with the resulting address & password.
            5. Run `tests/smoke/run-smoke.sh` after configuring your domain to verify headers and session guard logic.

            ### 🔐 Security Checklist
            - Regenerate RSA/JWT keys in production and store them securely.
            - Rotate MySQL and Guacamole credentials before exposing the stack.
            - Configure HTTPS either via OpenResty or your upstream load balancer.
            - Keep the `blockchain-services` submodule aligned with the commit recorded in this release.

            ### 📚 Docs
            - README.md – full architecture and operations guide
            - LOGGING.md – logging strategy & shipping tips
            - `tests/smoke/run-smoke.sh` – smoke test entrypoint with inline instructions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
