name: Security Scan

on:
  push:
    branches:
      - main
      - lite
  pull_request:
    branches:
      - "*"
  schedule:
    # Run weekly on Monday at 6 AM UTC
    - cron: "0 6 * * 1"

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: actions,java,javascript,python,cpp
          queries: security-extended,security-and-quality
          # Keep documented, reviewed false-positive suppressions in source
          # code effective for the monorepo scan as well as the Java module scan.
          packs: codeql/java-queries:AlertSuppression.ql,codeql/java-queries:AlertSuppressionAnnotations.ql

      - name: Set up Temurin JDK 21
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build native proxy for CodeQL
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libssl-dev ninja-build
          cmake -S fmu-proxy-runtime-src -B fmu-proxy-runtime-src/build-codeql -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build fmu-proxy-runtime-src/build-codeql --parallel 2

      - name: Build blockchain-services submodule
        run: mvn -B -ntp package -DskipTests
        working-directory: blockchain-services

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06 # v4

  python-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Audit FMU runner dependencies
        run: |
          python -m pip install --disable-pip-version-check --no-cache-dir pip-audit
          pip-audit -r fmu-runner/requirements.txt

      - name: Audit Ops worker dependencies
        run: pip-audit -r ops-worker/requirements.txt

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
