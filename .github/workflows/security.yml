name: Security Scan

on:
  push:
    branches:
      - main
      - lite
  pull_request:
    branches:
      - "*"
  schedule:
    # Run weekly on Monday at 6 AM UTC
    - cron: "0 6 * * 1"

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        with:
          languages: actions,javascript,python,cpp
          config-file: .github/codeql/codeql-config.yml

      - name: Build native proxy for CodeQL
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y libssl-dev ninja-build
          cmake -S fmu-proxy-runtime-src -B fmu-proxy-runtime-src/build-codeql -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build fmu-proxy-runtime-src/build-codeql --parallel 2

      - name: Perform CodeQL Analysis
        id: analyze
        uses: github/codeql-action/analyze@eec0bff2f6c15bf3f1e8a0152f94d17664a06a06 # v4
        with:
          output: sarif-results

      - name: Dismiss documented CodeQL suppressions
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: advanced-security/dismiss-alerts@a18f986bdb40edba0dd7a74382c15d4a3d50a1c8 # v2.0.3
        with:
          sarif-id: ${{ steps.analyze.outputs.sarif-id }}
          sarif-file: sarif-results
        env:
          GITHUB_TOKEN: ${{ github.token }}

  python-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Audit FMU runner dependencies
        run: |
          python -m pip install --disable-pip-version-check --no-cache-dir pip-audit
          pip-audit -r fmu-runner/requirements.txt

      - name: Audit Ops worker dependencies
        run: pip-audit -r ops-worker/requirements.txt

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
