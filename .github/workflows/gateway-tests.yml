name: Gateway Tests

on:
  push:
    branches: ["full", "lite", "main"]
  pull_request:
    branches: ["full", "lite", "main"]

permissions:
  contents: read
  packages: read
  security-events: read

jobs:
  python-unit-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            fmu-runner/requirements.txt
            fmu-runner/requirements-dev.txt

      - name: Install Python test dependencies
        working-directory: fmu-runner
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Run FMU Runner tests with coverage gate
        working-directory: fmu-runner
        run: |
          python -m pytest tests \
            --cov=. \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=60 \
            -q

      - name: Upload Python coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: fmu-runner-coverage
          path: fmu-runner/coverage.xml

  lua-unit-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run Lua unit tests with coverage
        env:
          LUA_PATH: "/workspace/lua/?.lua;/workspace/lua/?/init.lua;;"
        run: >
          docker run --rm
          -e LUA_PATH="${LUA_PATH}"
          -v "${{ github.workspace }}/openresty:/workspace"
          -w /workspace
          openresty/openresty:alpine-fat sh -c
          "luarocks install luacov >/dev/null &&
           luajit -lluacov tests/run.lua &&
           luacov"

      - name: Upload Lua coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: openresty-luacov
          path: |
            openresty/luacov.report.out
            openresty/luacov.stats.out

  smoke-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Run OpenResty smoke test
        run: |
          chmod +x tests/smoke/run-smoke.sh
          tests/smoke/run-smoke.sh
