services:
  blockchain-services:
    build:
      context: ./mocks/blockchain-services
      dockerfile: Dockerfile
    volumes:
      - ./jwt.txt:/data/jwt.txt:ro

  guacamole:
    build:
      context: ./mocks/guacamole
      dockerfile: Dockerfile

  openresty:
    build:
      context: ../../openresty
      dockerfile: Dockerfile
    environment:
      AUTH_ACCESS_CODE_REDEEMER_TOKEN: smoke-redeemer-token
      SESSION_OBSERVATION_INGEST_TOKEN: smoke-observation-token
      GUAC_ADMIN_USER: admin
      GUAC_ADMIN_PASS: secret
      SERVER_NAME: lab.test
      HTTPS_PORT: "18443"
      GUAC_API_URL: http://guacamole:8080/guacamole/api
      LAB_MANAGER_TOKEN: test-ops-secret-123
      ADMIN_ACCESS_TOKEN: smoke-access-token
      ADMIN_DASHBOARD_ALLOW_PRIVATE: "true"
      SECURITY_ALLOW_PRIVATE_NETWORKS: "true"
    volumes:
      - ./certs:/etc/ssl/private
      - ../../openresty/lab_access.conf:/etc/openresty/lab_access.conf:ro
      - ../../openresty/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ../../openresty/lua:/etc/openresty/lua:ro
      - ../../web:/var/www/html:ro
      - ./lab-content:/var/www/lab-content:ro
    ports:
      - "18443:443"
    depends_on:
      guacamole:
        condition: service_started
      ops-worker:
        condition: service_started
      fmu-runner:
        condition: service_started
    command: sh -c "sleep 3 && /usr/local/openresty/bin/openresty -g 'daemon off;'"

  ops-worker:
    image: hashicorp/http-echo:0.2.3
    command: ["-listen=:8081", "-text=ops-worker-ok"]

  fmu-runner:
    image: hashicorp/http-echo:0.2.3
    command: ["-listen=:8090", "-text=fmu-runner-ok"]
