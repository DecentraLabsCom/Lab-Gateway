
# Export environment variables so Lua can access them
env HTTPS_PORT;
env HTTP_PORT;
env SERVER_NAME;
env ISSUER;
env AUTH_ACCESS_CODE_REDEEM_URL;
env AUTH_ACCESS_CODE_REDEEMER_TOKEN;
env SESSION_OBSERVATION_INGEST_TOKEN;
env OPS_SESSION_OBSERVATION_INGEST_URL;
env GUAC_ADMIN_USER;
env GUAC_ADMIN_PASS;
env AUTO_LOGOUT_ON_DISCONNECT;
env GUAC_API_URL;
env OPS_API_URL;
env OPS_INTERNAL_AUTH_TOKEN;
env OPS_INTERNAL_AUTH_HEADER;
env CORS_ALLOWED_ORIGINS;
env MARKETPLACE_URL;
env ADMIN_ACCESS_TOKEN;
env ADMIN_ACCESS_TOKEN_HEADER;
env ADMIN_ACCESS_TOKEN_COOKIE;
env ADMIN_ACCESS_TOKEN_REQUIRED;
env ADMIN_DASHBOARD_LOCAL_ONLY;
env ADMIN_DASHBOARD_ALLOW_PRIVATE;
env SECURITY_ALLOW_PRIVATE_NETWORKS;
env ADMIN_ALLOWED_CIDRS;
env LAB_MANAGER_TOKEN;
env LAB_MANAGER_TOKEN_HEADER;
env LAB_MANAGER_TOKEN_COOKIE;
env GUACAMOLE_PROVISIONER_TOKEN;
env GUACAMOLE_PROVISIONER_TOKEN_HEADER;
env LAB_ADMIN_BACKEND_URL;
env LAB_ADMIN_BACKEND_TOKEN;
env LAB_ADMIN_BACKEND_TOKEN_HEADER;
env LAB_ADMIN_BACKEND_ALLOW_INSECURE;
env ADMIN_TRUST_FORWARDED_IP;
env FMU_RUNNER_ENABLED;
env AAS_ENABLED;
env BASYX_AAS_URL;
env AAS_ALLOWED_HOSTS;
env AAS_SERVICE_TOKEN;
env AAS_SERVICE_TOKEN_HEADER;
env JWT_GUAC_IDLE_TIMEOUT_SECONDS;
env GUACAMOLE_LOGIN_RATE_LIMIT_PER_MINUTE;
env DEMO_USER;
env DEMO_LAB_ID;

# Container user is set via docker-compose.yml (HOST_UID/HOST_GID).
# Omitting the 'user' directive lets nginx run as the container user.
worker_processes  1;

#error_log  /var/log/nginx/error.log;
#error_log  /var/log/nginx/error.log notice;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;
    #resolver 62.204.192.20 62.204.192.21 valid=300s;

    # Proxy locations overwrite X-Forwarded-For with the normalized
    # $remote_addr. Never enable real_ip from an arbitrary forwarded header.
    # Deployments behind Cloudflare or another external reverse proxy can add
    # a snippet under /etc/openresty/real_ip.d with that proxy's published
    # CIDRs and canonical client header (see real_ip.d/README.md), for example:
    #   set_real_ip_from <trusted-proxy-cidr>;
    #   real_ip_header CF-Connecting-IP;
    #   real_ip_recursive on;
    # The trusted CIDRs must be maintained as deployment configuration; do not
    # use 0.0.0.0/0 or trust client-supplied X-Forwarded-For values.
    include /etc/openresty/real_ip.d/*.conf;

    log_format gateway_sanitized '$remote_addr - $remote_user [$time_local] '
        '"$request_method $uri $server_protocol" $status $body_bytes_sent '
        '"$http_referer" "$http_user_agent" "$http_x_forwarded_for"';

    # Manual Guacamole credential endpoint: a conservative per-client edge
    # bucket complements the per-user Lua counter in access.lua.
    limit_req_zone $binary_remote_addr zone=guac_token_login_ip:10m rate=30r/m;

    # Only propagate the hop-by-hop headers required for a WebSocket upgrade.
    # Plain HTTP requests must explicitly close the upstream connection.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Temp paths must be writable when running as non-root.
    client_body_temp_path /tmp/client_body_temp 1 2;
    proxy_temp_path /tmp/proxy_temp 1 2;
    fastcgi_temp_path /tmp/fastcgi_temp 1 2;
    uwsgi_temp_path /tmp/uwsgi_temp 1 2;
    scgi_temp_path /tmp/scgi_temp 1 2;

    #log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    #                  '$status $body_bytes_sent "$http_referer" '
    #                  '"$http_user_agent" "$http_x_forwarded_for"';

    sendfile        on;
    #tcp_nopush     on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    #gzip  on;

    # The full Lua search path is defined in lab_access.conf to include
    # installed resty/luarocks modules plus the project-local Lua sources.

    lua_ssl_verify_depth 2;
    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

    lua_shared_dict config 1m;
    lua_shared_dict cache 4m;
    # Dedicated short-lived counters for the manual Guacamole credential
    # endpoint.  Keeping this separate from session state prevents a busy
    # gateway from evicting rate-limit entries (or vice versa).
    lua_shared_dict guac_login_rate 1m;
    lua_shared_dict aas_link_cache 1m;
    lua_shared_dict demo_sessions 64k;

    resolver 127.0.0.11 valid=5s;
    include /etc/openresty/lab_access.conf;
}
